name: Bundle Size Gate

on:
  pull_request:
    branches: [main]

jobs:
  bundle-size:
    name: Check bundle size < 2MB (YouTube Playables limit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sb dist/ | cut -f1)
          MAX_SIZE=2097152
          echo "Bundle size: ${BUNDLE_SIZE} bytes"
          echo "Max allowed: ${MAX_SIZE} bytes (YouTube Playables 2MB limit)"
          if [ "$BUNDLE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "FAIL: Bundle size ${BUNDLE_SIZE} bytes exceeds 2MB Playables limit (${MAX_SIZE} bytes)"
            exit 1
          fi
          echo "PASS: Bundle size is within the 2MB Playables limit"
